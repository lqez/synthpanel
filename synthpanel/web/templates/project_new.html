{% extends "base.html" %}
{% block title %}새 프로젝트 · SynthPanel{% endblock %}
{% block body %}
  <h1>새 프로젝트</h1>
  <p class="muted">테스트할 URL과 중점, 대상 페르소나를 정합니다.</p>

  <form method="post" action="/projects/new" class="card">
    <label>프로젝트 이름</label>
    <input type="text" name="name" placeholder="My Vibe App" required>

    <label>대상 URL</label>
    <input type="url" name="url" placeholder="https://my-vibe-app.dev" required>

    <label>무엇을 중점적으로 테스트할까요? (focus)</label>
    <textarea name="focus" rows="3" placeholder="예: 회원가입부터 결제까지의 흐름, 모바일에서의 사용성"></textarea>

    <label>대상 페르소나</label>
    <p class="muted">라이브러리에서 선택하세요. (자동 추천기는 후속 단계)</p>
    {% for p in library %}
      <label class="check">
        <input type="checkbox" name="personas" value="{{ p.name }}" checked>
        <span><strong>{{ p.name }}</strong>
          {% if p.archetype %}<span class="muted">— {{ p.archetype }}</span>{% endif %}
          <br><span class="muted">목표: {{ p.intent.goal }}</span></span>
      </label>
    {% endfor %}

    <p style="margin-top:18px"><button class="btn" type="submit">프로젝트 생성 →</button></p>
  </form>
{% endblock %}
