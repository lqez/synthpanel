{% extends "base.html" %}
{% block title %}설정 · SynthPanel{% endblock %}
{% block body %}
  <p><a href="/projects">← 프로젝트</a></p>
  <h1>설정</h1>

  <form method="post" action="/preferences" class="card">
    <h2>기본 리포트 언어</h2>
    <p class="muted">새 프로젝트의 기본 리포트 언어입니다. 프로젝트마다 개별로 바꿀 수 있습니다.</p>
    <select name="language">
      {% for code, names in languages.items() %}
        <option value="{{ code }}" {% if code == current %}selected{% endif %}>{{ names[1] }}</option>
      {% endfor %}
    </select>
    <p style="margin-top:16px"><button class="btn" type="submit">저장</button></p>
  </form>
{% endblock %}
