name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: Unit tests (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run fast suite (e2e deselected)
        run: pytest -q

  e2e:
    name: End-to-end (real browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Install Chromium
        run: playwright install --with-deps chromium
      - name: Run e2e suite
        run: pytest -m e2e -q
