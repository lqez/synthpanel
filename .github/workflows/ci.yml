name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: Unit tests (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Run fast suite (e2e deselected)
        run: uv run pytest -q

  e2e:
    name: End-to-end (real browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Install Chromium
        run: uv run playwright install --with-deps chromium
      - name: Run e2e suite
        run: uv run pytest -m e2e -q
